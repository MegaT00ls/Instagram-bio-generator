<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Bio Generator</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  font-size: 28px;
}

p {
  color: #cbd5f5;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

.copy-all {
  background: #38bdf8;
}

.bio {
  background: #1e293b;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.copy-btn {
  background: #6366f1;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

.footer {
  margin-top: 30px;
  font-size: 14px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">
  <h1>Create Stylish Instagram Bios in Seconds ✨</h1>
  <p>Generate cool, funny, aesthetic bios instantly</p>

  <input type="text" id="name" placeholder="Enter your name">

  <select id="vibe">
    <option value="cool">Cool 😎</option>
    <option value="funny">Funny 😂</option>
    <option value="aesthetic">Aesthetic 🌙</option>
    <option value="sad">Sad 💔</option>
    <option value="savage">Savage 😈</option>
  </select>

  <button onclick="generateBio()">Generate Bio</button>
  <button class="copy-all" onclick="copyAll()">Copy All</button>

  <div id="output"></div>

  <div class="footer">
    Free tool • Made for creators 🚀
  </div>
</div>

<script>
function generateBio() {
  const name = document.getElementById("name").value || "Unknown";
  const vibe = document.getElementById("vibe").value;
  const output = document.getElementById("output");

  let bios = [];

  if (vibe === "cool") {
    bios = [
      `${name} 😎 | Living life my way`,
      `Just vibes ✨ | ${name}`,
      `${name} 🚀 | Dreams > Fear`,
      `Chill mode ON 😌 | ${name}`,
      `${name} 💯 | No limits`
    ];
  }

  if (vibe === "funny") {
    bios = [
      `${name} 😂 | Professional overthinker`,
      `I need a nap 😴 | ${name}`,
      `${name} 🤡 | CEO of bad decisions`,
      `Eating > Everything 🍕 | ${name}`,
      `${name} 🐒 | Still loading...`
    ];
  }

  if (vibe === "aesthetic") {
    bios = [
      `${name} 🌙 | lost in thoughts`,
      `soft soul ✨ | ${name}`,
      `${name} 🍃 | peace & silence`,
      `dreaming quietly 🌸 | ${name}`,
      `${name} ☁️ | floating`
    ];
  }

  if (vibe === "sad") {
    bios = [
      `${name} 💔 | silent pain`,
      `broken inside 🥀 | ${name}`,
      `${name} 😞 | nothing feels right`,
      `lost soul 🌧️ | ${name}`,
      `${name} 🖤 | fading slowly`
    ];
  }

  if (vibe === "savage") {
    bios = [
      `${name} 😈 | no mercy`,
      `stay mad 🔥 | ${name}`,
      `${name} 💣 | too real`,
      `zero chill ⚡ | ${name}`,
      `${name} 👑 | born to rule`
    ];
  }

  // Extra AI-style randomness
  bios = bios.map(bio => {
    const extras = ["🔥", "✨", "💫", "⚡", "🌟"];
    const random = extras[Math.floor(Math.random() * extras.length)];
    return bio + " " + random;
  });

  output.innerHTML = "";

  bios.forEach(bio => {
    const div = document.createElement("div");
    div.className = "bio";

    div.innerHTML = `
      <span>${bio}</span>
      <button class="copy-btn" onclick="copyText('${bio}')">Copy</button>
    `;

    output.appendChild(div);
  });
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function copyAll() {
  const bios = document.querySelectorAll(".bio span");
  let text = "";
  bios.forEach(b => text += b.innerText + "\\n");
  navigator.clipboard.writeText(text);
  alert("All bios copied!");
}
</script>

</body>
</html>
